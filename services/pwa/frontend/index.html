<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CTO</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="/static/icon-192.png" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
</head>
<body>
  <header class="topbar">
    <h1>CTO</h1>
    <div class="status" id="status">connecting…</div>
    <button id="refresh-app" title="Refresh the installed PWA shell and reload latest features">Update app</button>
  </header>
  <section class="feature-panel" aria-label="PWA improvements">
    <div class="feature-card">
      <strong>Background alerts</strong>
      <span>Enable push and send a live test notification.</span>
      <button id="enable-push">Enable/Test</button>
    </div>
    <div class="feature-card">
      <strong>Agent coordination</strong>
      <span>Show OpenClaw ↔ Hermes handoffs inline.</span>
      <label class="inline-toggle"><input type="checkbox" id="toggle-a2a" /> Show</label>
    </div>
    <div class="feature-card">
      <strong>Chat history</strong>
      <span>Open a durable human-readable transcript.</span>
      <a class="feature-link" id="chat-history" href="/chat-log/" target="_blank" rel="noopener">Open</a>
    </div>
    <div class="feature-card">
      <strong>Voice</strong>
      <span>Read replies aloud or dictate a message.</span>
      <button id="voice-toggle" aria-pressed="false" title="Speak new CTO replies aloud">Voice off</button>
    </div>
  </section>
  <main id="messages" aria-live="polite"></main>
  <form id="composer" autocomplete="off">
    <button type="button" id="voice-input" title="Dictate a message">🎙</button>
    <input id="input" name="text" placeholder="Talk to CTO. Use @Hermes to address Hermes directly." autofocus />
    <button type="submit">Send</button>
  </form>
  <script src="/static/app.js" defer></script>
</body>
</html>
